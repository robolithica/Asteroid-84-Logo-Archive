<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartoon Logo Database</title>

  <style>

    /* Global Styles */
    body {
      margin: 0;
      padding: 0;
      background-color: #03001e;
      font-family: 'Courier New', Courier, monospace;
      color: #00f0ff;
      overflow-x: hidden;
    }

    /* Animated 80s Grid Background */
    .grid-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      perspective: 500px;
      z-index: -1;
      overflow: hidden;
    }

    .grid {
      position: absolute;
      bottom: -250px;
      left: -50%;
      width: 200%;
      height: 200%;
      background-image:
        linear-gradient(to right, #00f0ff 2px, transparent 2px),
        linear-gradient(to bottom, #00f0ff 2px, transparent 2px);
      background-size: 60px 60px;
      transform: rotateX(60deg);
      animation: gridMove 10s linear infinite;
    }

    @keyframes gridMove {
      0% {
        transform: rotateX(60deg) translateY(0);
      }

      100% {
        transform: rotateX(60deg) translateY(60px);
      }
    }

    /* Header */
    header {
      text-align: center;
      padding: 3rem 1rem;
    }

    header img {
      display: block;
      margin: 0 auto;
      max-width: 700px;
      width: 100%;
      height: auto;
    }

    p {
      color: #00f0ff;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-shadow: 0 0 5px #00f0ff;
      margin-top: 0.5rem;
    }

    /* Museum Gallery Grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 3rem;
      padding: 2rem 5vw;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* CRT Monitor / Frame Style */
    .card {
      background: #100b21;
      border: 3px solid #00f0ff;
      border-radius: 15px;
      padding: 15px;
      box-shadow:
        0 0 15px rgba(255, 0, 127, 0.4),
        inset 0 0 15px rgba(255, 0, 127, 0.2);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      text-decoration: none;
      color: inherit;
    }

    .card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(
        rgba(255,255,255,0.03) 50%,
        rgba(0,0,0,0.2) 50%
      );
      background-size: 100% 4px;
      pointer-events: none;
      border-radius: 12px;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      border-color: #00f0ff;
      box-shadow:
        0 0 25px rgba(0, 240, 255, 0.6),
        inset 0 0 25px rgba(0, 240, 255, 0.3);
    }

    /* Card Images */
    .card img {
      width: 100%;
      height: auto;
      max-height: 220px;
      object-fit: contain;
      border-radius: 10px;
      filter: contrast(1.2) saturate(1.1);
      transition: filter 0.3s ease;
    }

    .card:hover img {
      filter: contrast(1.4) saturate(1.5);
    }

    /* Image Title */
    .card h3 {
      color: #ffff00;
      text-shadow: 0 0 5px #ffff00;
      margin: 1.5rem 0 0.5rem;
      text-align: center;
    }

    .card p {
      color: #fff;
      font-size: 0.9rem;
      text-align: center;
      margin: 0;
      text-shadow: none;
    }

  </style>

</head>

<body>

  <!-- Animated Synthwave Grid -->
  <div class="grid-container">
    <div class="grid"></div>
  </div>

  <!-- Page Header -->
  <header>

    <img src="Asteroid 84 Logo.png" alt="Cartoon Logo Database Logo">

    <p>
      A Museum of 70s-80s-90s Cartoon, Toy, and Comic Book Logos
    </p>

  </header>

  <!-- Image Gallery -->
  <div class="gallery">

    <!-- Card 1 -->
    <a class="card" href="">

      <img src="Asteroid84 CARTOONS.png" alt="Cartoons">

      <h3>Cartoons</h3>

      <p>Saturday Morning Rituals</p>

    </a>

    <!-- Card 2 -->
    <div class="card">

      <img src="Asteroid84 TOYS.png" alt="Toys">

      <h3>Toylines</h3>

      <p>Highly Addictive Plastic</p>

    </div>

    <!-- Card 3 -->
    <div class="card">

      <img src="Asteroid84 COMICS.png" alt="Comic Books">

      <h3>Comics</h3>

      <p>Newsprint That Fired Our Imaginations</p>

    </div>

  </div>

</body>
</html>
