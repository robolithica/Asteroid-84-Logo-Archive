<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beverly Hills Teens</title>

<style>
@font-face {
    font-family: 'IBMDOS';
    src: url('../FONTS/IBM_DOS_ISO8.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'IBMDOS', monospace;
    background-color: #000;
    color: #39ff88;
    letter-spacing: 1px;
    text-shadow:
        0 0 3px rgba(0, 255, 102, 0.9),
        0 0 6px rgba(0, 255, 102, 0.6),
        0 0 10px rgba(0, 255, 102, 0.35);
    overflow-x: hidden;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
        url("../IMAGES/starfield.png") center/cover no-repeat;
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(to right, rgba(57,255,136,0.25) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(57,255,136,0.25) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0));
    pointer-events: none;
    z-index: -1;
}

.page-header {
    text-align: center;
    margin-top: 40px;
    margin-bottom: 60px;
}

.page-title {
    font-size: clamp(0.75rem, 2.5vw, 5rem);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 20px;
}

.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    max-width: 1800px;
    margin: 0 auto;
}

.gallery-item {
    flex: 0 1 calc(16.666% - 12px);
    max-width: 280px;
    text-align: center;
    position: relative;
    overflow: visible;
}

.gallery-item img {
    width: 100%;
    display: block;
    border: 2px solid rgba(57,255,136,0.5);
    cursor: pointer;
}

.gallery-item img:hover {
    transform: scale(1.01);
    box-shadow: 0 0 20px rgba(57,255,136,0.6);
}

.caption {
    margin-top: 14px;
    font-size: 0.55rem;
}

.franchise-rating {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.75);
    border-radius: 6px;
    z-index: 1000;
    backdrop-filter: blur(4px);
}

.rating-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
}

.rating-content {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1rem;
}

.rating-tooltip {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 10px;
    width: 260px;
    padding: 12px;
    background: rgba(0,0,0,0.95);
    border: 1px solid #39ff88;
    font-size: 0.65rem;
    line-height: 1.5;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    white-space: pre-line;
    transition: 0.2s;
}

.franchise-rating:hover .rating-tooltip {
    opacity: 1;
    visibility: visible;
}
</style>
</head>
<div class="franchise-rating">
    <div class="rating-label">SHRED RATING</div>

    <div class="rating-content">
        <img src="../IMAGES/vhs-icon.svg">
        <span id="overall-score">0/10</span>
    </div>

    <div class="rating-tooltip">
C:\ASTEROID84\SCAN>

WRITING:      <span id="writing-score">2</span>/10
VISUALS:      <span id="visual-score">5</span>/10
CHARACTERS:   <span id="character-score">2</span>/10
MUSIC:        <span id="music-score">4</span>/10
NOSTALGIA:    <span id="nostalgia-score">3</span>/10

OVERALL:      <span id="tooltip-overall">0</span>/10
    </div>
</div>

<script>
// SHRED RATING ENGINE

const writing = 2;
const visuals = 5;
const characters = 2;
const music = 4;
const nostalgia = 3;

const overall =
(
    writing * 0.35 +
    visuals * 0.25 +
    characters * 0.15 +
    music * 0.15 +
    nostalgia * 0.10
).toFixed(1);

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("overall-score").textContent = overall + "/10";
    document.getElementById("tooltip-overall").textContent = overall;
});
</script>

<script>
// LIGHTBOX

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxCaption = document.getElementById("lightbox-caption");
const galleryImages = document.querySelectorAll(".gallery-item img");
const closeBtn = document.querySelector(".lightbox-close");

galleryImages.forEach(img => {
    img.addEventListener("click", () => {
        lightbox.classList.add("active");
        lightboxImg.src = img.dataset.full || img.src;
        lightboxCaption.textContent = img.alt;
        document.body.style.overflow = "hidden";
    });
});

function closeLightbox() {
    lightbox.classList.remove("active");
    document.body.style.overflow = "";
}

closeBtn.addEventListener("click", closeLightbox);

lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) closeLightbox();
});

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeLightbox();
});
</script>
